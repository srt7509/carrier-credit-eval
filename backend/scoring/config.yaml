# 评级阈值
grade_thresholds:
  AAA: 90
  AA: 80
  A: 70
  B: 60
  C: 0

# 风险预警阈值
risk_thresholds:
  score_drop: 50
  complaint_rate: 5
  accident_count: 2

# 模型切换条件
switch_conditions:
  min_consecutive_months: 6
  min_epv: 50
  ks_not_lower_than_champion: true
  max_psi: 0.1
  min_spearman: 0.75
