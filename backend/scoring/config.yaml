# 承运商信用评价系统 - 评分配置
version: "v2.0"

# 当前冠军模型
champion_model: "v1.0"
challenger_model: "v2.0"

# === 冠军模型 v1.0: 五维度评价体系 ===
dimensions:
  企业资质:
    weight: 0.17
    indicators:
      证照有效性:
        weight: 0.4
        formula: "license_valid * 100"
      经营年限:
        weight: 0.3
        formula: "min(100, cooperation_months / 12 * 10)"
      注册资本评级:
        weight: 0.3
        formula: "80"

  履约能力:
    weight: 0.28
    indicators:
      订单完成率:
        weight: 0.4
        formula: "completed_orders / total_orders * 100"
      准时率:
        weight: 0.3
        formula: "on_time_orders / completed_orders * 100"
      近三月订单量:
        weight: 0.3
        formula: "min(100, recent_3m_orders / 2)"

  服务质量:
    weight: 0.22
    indicators:
      客户评分:
        weight: 0.4
        formula: "avg_customer_rating * 20"
      投诉率:
        weight: 0.3
        formula: "max(0, 100 - complaint_count / total_orders * 200)"
        penalty: true
      货损率:
        weight: 0.3
        formula: "max(0, 100 - damage_rate * 100)"

  行为合规:
    weight: 0.16
    indicators:
      违章记录:
        weight: 0.4
        formula: "max(0, 100 - violation_count * 10)"
        penalty: true
      安全事故:
        weight: 0.4
        formula: "max(0, 100 - accident_count * 20)"
        penalty: true
      按时结款率:
        weight: 0.2
        formula: "on_time_payment_rate * 100"

  经营信用:
    weight: 0.17
    indicators:
      结账及时率:
        weight: 0.5
        formula: "on_time_payment_rate * 100"
      历史欠款:
        weight: 0.5
        formula: "max(0, 100 - overdue_amount / 10000)"

# === 挑战者模型 v2.0: 调整权重与指标 ===
dimensions_v2:
