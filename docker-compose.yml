services:
  backend:
    build:
      context: ./backend
    container_name: credit-backend
    ports:
      - "5001:5001"
    environment:
      - CREDIT_SECRET_KEY=${CREDIT_SECRET_KEY:-credit_prototype_secret_key_2025}
      - CREDIT_LOG_LEVEL=INFO
    volumes:
      - credit_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/stats')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: credit-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  credit_data:
